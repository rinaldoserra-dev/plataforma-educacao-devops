name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  build-test:
    name: Build e testes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restaurar dependências
        run: dotnet restore PlataformaEducacao.sln

      - name: Build (Release)
        run: dotnet build PlataformaEducacao.sln -c Release --no-restore

      - name: Testes com coleta de cobertura
        run: dotnet test PlataformaEducacao.sln -c Release --no-build --collect:"XPlat Code Coverage"

  lint:
    name: Lint e análise estática
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restaurar dependências
        run: dotnet restore PlataformaEducacao.sln

      - name: Verificar formatação (dotnet format)
        run: dotnet format PlataformaEducacao.sln --verify-no-changes --no-restore

  docker-push:
    name: Build e push das imagens
    needs: [build-test, lint]
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gestao-identidade-api
            dockerfile: src/services/GestaoIdentidade/PlataformaEducacao.GestaoIdentidade.Api/Dockerfile
          - service: gestao-conteudo-api
            dockerfile: src/services/GestaoConteudo/PlataformaEducacao.GestaoConteudo.Api/Dockerfile
          - service: gestao-aluno-api
            dockerfile: src/services/GestaoAluno/PlataformaEducacao.GestaoAluno.Api/Dockerfile
          - service: gestao-financeira-api
            dockerfile: src/services/GestaoFinanceira/PlataformaEducacao.GestaoFinanceira.Api/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e push - ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/plataforma-educacao-${{ matrix.service }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/plataforma-educacao-${{ matrix.service }}:${{ github.sha }}
