name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_VERSION: '8.0.x'
  COVERAGE_THRESHOLD: 80

jobs:

  build-test:
    name: Build e Testes
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restaurar dependências
        run: dotnet restore PlataformaEducacao.sln

      - name: Build
        run: dotnet build PlataformaEducacao.sln -c Release --no-restore

      - name: Executar testes com cobertura
        run: >
          dotnet test PlataformaEducacao.sln
          -c Release
          --no-build
          --collect:"XPlat Code Coverage"
          --settings coverage.runsettings
          --results-directory TestResults

      - name: Instalar ReportGenerator
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool --version 5.4.3
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Gerar relatório consolidado
        run: |
          reportgenerator \
            -reports:"**/coverage.cobertura.xml" \
            -targetdir:"TestResults/CoverageReport" \
            -reporttypes:"HtmlInline;Cobertura"

      - name: Instalar xmllint
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-utils

      - name: Validar cobertura
        shell: bash
        run: |

          LINE_RATE=$(xmllint --xpath "string(/coverage/@line-rate)" TestResults/CoverageReport/Cobertura.xml)

          COVERAGE=$(awk "BEGIN { printf \"%.1f\", $LINE_RATE * 100 }")

          echo "Cobertura: ${COVERAGE}%"

          echo "## 📊 Code Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Métrica | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|------:|" >> $GITHUB_STEP_SUMMARY
          echo "| Line Coverage | ${COVERAGE}% |" >> $GITHUB_STEP_SUMMARY
          echo "| Threshold | ${{ env.COVERAGE_THRESHOLD }}% |" >> $GITHUB_STEP_SUMMARY

          if (( $(echo "$COVERAGE < ${{ env.COVERAGE_THRESHOLD }}" | bc -l) )); then
            echo "::error::Cobertura ${COVERAGE}% abaixo do mínimo de ${{ env.COVERAGE_THRESHOLD }}%"
            exit 1
          fi

          echo "::notice::Cobertura aprovada (${COVERAGE}%)"

      - name: Upload do relatório de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: TestResults/CoverageReport

  lint:
    name: Lint e análise estática

    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restaurar dependências
        run: dotnet restore PlataformaEducacao.sln

      - name: Verificar formatação
        run: dotnet format PlataformaEducacao.sln --verify-no-changes --no-restore

  docker-push:
    name: Build e Push das Imagens

    needs:
      - build-test
      - lint

    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      fail-fast: false

      matrix:
        include:
          - service: gestao-identidade-api
            dockerfile: src/services/GestaoIdentidade/PlataformaEducacao.GestaoIdentidade.Api/Dockerfile

          - service: gestao-conteudo-api
            dockerfile: src/services/GestaoConteudo/PlataformaEducacao.GestaoConteudo.Api/Dockerfile

          - service: gestao-aluno-api
            dockerfile: src/services/GestaoAluno/PlataformaEducacao.GestaoAluno.Api/Dockerfile

          - service: gestao-financeira-api
            dockerfile: src/services/GestaoFinanceira/PlataformaEducacao.GestaoFinanceira.Api/Dockerfile

          - service: bff-api
            dockerfile: src/api-gateways/PlataformaEducacao.Bff.Api/Dockerfile

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e Push - ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/plataforma-educacao-${{ matrix.service }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/plataforma-educacao-${{ matrix.service }}:${{ github.sha }}